version: "3"

services:
  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    depends_on:
      - backend

  backend:
    build: ./backend
    ports:
      - "5000:5000"
    depends_on:
      - mongo
      - ai

  ai:
    build: ./ai_services
    ports:
      - "8000:8000"

  mongo:
    image: mongo
    ports:
      - "27017:27017"